<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveDex — Competitive Pokémon Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF;
  --text-primary:#FFFFFF;
  --text-secondary:#AFC3DD;
  --text-muted:#7E95B6;
  --royal:#2F6FED;
  --royal-light:#3C86FF;
  --glass-bg:rgba(15,30,55,.82);
  --glass-border:rgba(255,255,255,.08);
  --glass-shadow:0 15px 35px rgba(0,0,0,.35);
  --nav-bg:rgba(10,24,47,.85);
  --input-bg:#12284A;
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  background:linear-gradient(180deg,#071321 0%,#08192d 50%,#0b2140 100%);
}

.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.glow-tl{width:500px;height:500px;top:-150px;left:-200px;background:radial-gradient(circle,rgba(27,75,149,.4),transparent 70%);}
.glow-tr{width:480px;height:480px;top:100px;right:-220px;background:radial-gradient(circle,rgba(47,111,237,.22),transparent 70%);}
.glow-bl{width:520px;height:520px;bottom:-200px;left:-180px;background:radial-gradient(circle,rgba(91,143,249,.2),transparent 70%);}
.glow-br{width:600px;height:600px;bottom:-250px;right:-250px;background:radial-gradient(circle,rgba(47,111,237,.3),transparent 70%);}
.glow-c{width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(100,200,255,.06),transparent 70%);}

.navbar{
  position:sticky;top:0;z-index:100;
  min-height:70px;
  display:flex;align-items:center;gap:16px;
  padding:10px 40px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.nav-brand{
  font-family:var(--font-display);font-weight:800;font-size:24px;
  color:var(--white);letter-spacing:-0.02em;
  white-space:nowrap;flex-shrink:0;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  width:clamp(200px,40vw,520px);height:44px;
  background:var(--input-bg);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:0 6px 0 14px;
}
.search-box svg{flex-shrink:0;opacity:.5;}
.search-box input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--white);font-family:var(--font-body);font-size:14px;
}
.search-box input::placeholder{color:var(--text-muted);}
.search-box button{
  background:linear-gradient(135deg,#2F6FED,#3C86FF);
  color:white;border:none;border-radius:12px;
  padding:0 18px;height:32px;
  font-family:var(--font-body);font-weight:600;font-size:13px;
  cursor:pointer;transition:all .2s ease;flex-shrink:0;
}
.search-box button:hover{transform:translateY(-1px);box-shadow:0 0 18px rgba(47,111,237,.45);}
.back-btn{
  display:none;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);color:var(--text-secondary);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  padding:0 16px;height:36px;
  font-family:var(--font-body);font-weight:600;font-size:13px;
  cursor:pointer;transition:all .15s ease;flex-shrink:0;
}
.back-btn:hover{background:rgba(255,255,255,.1);color:var(--white);}
.back-btn.visible{display:flex;}

main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px clamp(16px,4vw,40px) 80px;}

.loading-state{
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:120px 20px;color:var(--text-muted);font-size:16px;
}
.spinner{
  width:24px;height:24px;
  border:3px solid rgba(255,255,255,.1);border-top-color:var(--royal);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.error-state{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  gap:8px;padding:120px 20px;color:var(--text-muted);
}
.error-state strong{color:var(--white);font-size:20px;font-family:var(--font-display);}

/* ── Pokemon Grid ──────────────────────────────────────── */
.poke-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:12px;
}
.poke-grid-item{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(10,24,47,.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:14px 8px 10px;
  cursor:pointer;transition:all .15s ease;
}
.poke-grid-item:hover{
  background:rgba(47,111,237,.15);
  border-color:rgba(47,111,237,.3);
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.3);
}
.poke-grid-item img{
  width:72px;height:72px;object-fit:contain;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));
  image-rendering:pixelated;
  opacity:0;transition:opacity .3s ease;
}
.poke-grid-item img.loaded{opacity:1;}
.poke-grid-item .grid-id{
  font-size:11px;color:var(--text-muted);font-weight:600;margin-top:6px;
}
.poke-grid-item .grid-name{
  font-size:12px;color:var(--text-secondary);font-weight:600;
  text-align:center;line-height:1.2;margin-top:2px;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.poke-grid-item.has-build{border-color:rgba(47,111,237,.25);}
.poke-grid-item.has-build .grid-name{color:var(--white);}

.grid-count{
  text-align:center;color:var(--text-muted);font-size:13px;
  margin-bottom:16px;
}
.grid-loader{
  display:flex;align-items:center;justify-content:center;
  padding:24px;color:var(--text-muted);font-size:13px;gap:8px;
}
.grid-loader .spinner{width:16px;height:16px;}

/* ── Detail View ───────────────────────────────────────── */
.layout{display:grid;grid-template-columns:minmax(280px,320px) 1fr;gap:18px;align-items:start;}

.poke-card{
  position:sticky;top:102px;
  background:rgba(10,24,47,.78);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:20px;padding:clamp(16px,2vw,22px);
  box-shadow:0 20px 40px rgba(0,0,0,.35);
}
.poke-card img{
  width:min(260px,100%);height:auto;max-height:260px;object-fit:contain;
  filter:drop-shadow(0 14px 28px rgba(0,0,0,.45));
  margin:0 auto;display:block;
}
.poke-card .dex-num{color:var(--text-muted);font-size:14px;text-align:center;margin-top:12px;}
.poke-card .name{
  font-family:var(--font-display);font-size:clamp(28px,4vw,40px);font-weight:700;
  color:var(--white);text-align:center;margin:4px 0 8px;
}
.types{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.type-badge{
  font-size:11px;padding:4px 14px;border-radius:20px;
  color:#0a0d12;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
}
.poke-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  padding:16px 0;
  border-top:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
  margin:8px 0;
}
.poke-stat{text-align:center;}
.poke-stat .stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.poke-stat .stat-value{font-size:16px;color:var(--white);font-weight:600;}
.poke-dex-entry{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:12px;}

.content-col{display:flex;flex-direction:column;gap:clamp(12px,2vw,18px);}

.card{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:18px;padding:clamp(18px,2.5vw,28px) clamp(16px,2.5vw,32px);
  box-shadow:var(--glass-shadow);
}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.card-header h2{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--white);margin:0;}
.tier-pill{
  display:inline-block;font-size:12px;font-weight:700;
  color:#7fb1ff;background:rgba(47,111,237,.15);
  border:1px solid rgba(47,111,237,.35);
  padding:4px 14px;border-radius:20px;
}

.build-columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(16px,2vw,24px);}
.build-col-title{
  font-size:12px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.5px;font-weight:600;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.build-col-title svg{color:var(--royal-light);flex-shrink:0;}

.build-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.build-row:last-child{border-bottom:none;}
.build-row-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.build-row-header svg{color:var(--royal-light);flex-shrink:0;}
.build-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.build-value{font-size:clamp(13px,1.3vw,15px);color:var(--white);font-weight:600;padding-left:24px;word-break:break-word;}

.ev-bar{
  display:flex;height:6px;border-radius:3px;overflow:hidden;
  margin-top:8px;margin-left:24px;gap:2px;background:rgba(255,255,255,.06);
}
.ev-segment{height:100%;border-radius:3px;transition:width .3s;}

.move-pill{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;font-size:14px;color:var(--white);font-weight:500;
}
.move-pill svg{color:var(--text-muted);flex-shrink:0;}
.move-pill .move-type-badge{
  margin-left:auto;font-size:9px;padding:2px 8px;
  border-radius:10px;font-weight:700;color:#0a0d12;flex-shrink:0;
}

.about-text{font-size:14px;color:var(--text-secondary);line-height:1.65;margin:0 0 20px;}
.smogon-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px 20px;
  background:linear-gradient(135deg,#2F6FED,#3C86FF);
  color:white;border:none;border-radius:12px;
  font-family:var(--font-body);font-weight:600;font-size:14px;
  text-decoration:none;cursor:pointer;transition:all .2s ease;
}
.smogon-btn:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(47,111,237,.45);}

/* ── Set Selector ──────────────────────────────────────── */
.set-selector{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;
}
.set-btn{
  font-size:12px;font-weight:600;padding:6px 14px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:var(--text-secondary);cursor:pointer;
  transition:all .15s ease;
}
.set-btn:hover{background:rgba(47,111,237,.15);border-color:rgba(47,111,237,.3);color:var(--white);}
.set-btn.active{background:rgba(47,111,237,.2);border-color:rgba(47,111,237,.5);color:var(--white);}

/* ── Evolution Chain ───────────────────────────────────── */
.evo-section{margin-top:0;}
.evo-section-title{
  font-size:12px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.5px;font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.evo-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.evo-node{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:10px 12px 8px;cursor:pointer;
  transition:all .15s ease;min-width:70px;
}
.evo-node:hover{background:rgba(47,111,237,.15);border-color:rgba(47,111,237,.3);}
.evo-node.current{border-color:rgba(47,111,237,.5);background:rgba(47,111,237,.12);}
.evo-node img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));image-rendering:pixelated;}
.evo-node .evo-name{font-size:10px;color:var(--text-secondary);font-weight:600;text-align:center;white-space:nowrap;}
.evo-node .evo-detail{font-size:9px;color:var(--text-muted);text-align:center;}
.evo-arrow{
  color:var(--text-muted);flex-shrink:0;display:flex;align-items:center;flex-direction:column;gap:2px;
}
.evo-arrow svg{width:18px;height:18px;}
.evo-arrow .evo-method{font-size:8px;color:var(--text-muted);white-space:nowrap;}

/* ── Base Stats Bars ───────────────────────────────────── */
.base-stats{margin-top:0;}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-row .stat-name{font-size:11px;color:var(--text-secondary);font-weight:600;width:36px;text-align:right;flex-shrink:0;}
.stat-row .stat-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.stat-row .stat-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.stat-row .stat-val{font-size:12px;color:var(--white);font-weight:600;width:30px;flex-shrink:0;}
.base-stats-total{
  font-size:12px;color:var(--text-muted);text-align:right;margin-top:4px;
}

/* ── Abilities ─────────────────────────────────────────── */
.ability-list{display:flex;flex-wrap:wrap;gap:6px;}
.ability-pill{
  font-size:11px;color:var(--text-secondary);background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 10px;font-weight:500;
}
.ability-pill.hidden-ability{border-color:rgba(255,215,0,.25);color:#ffd700;}

/* ── Item Sprites ──────────────────────────────────────── */
.item-sprite{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));flex-shrink:0;}

/* ── Fallback Sections ─────────────────────────────────── */
.fallback-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(12px,2vw,20px);}
.fallback-section{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:14px 16px;
}
.fallback-section-title{
  font-size:11px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.5px;font-weight:600;margin-bottom:10px;
}
.suggested-moves{display:flex;flex-wrap:wrap;gap:6px;}
.suggested-move{
  font-size:12px;color:var(--white);background:rgba(47,111,237,.12);
  border:1px solid rgba(47,111,237,.25);border-radius:8px;padding:4px 10px;font-weight:500;
}
.suggested-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.suggested-item img{width:20px;height:20px;object-fit:contain;}
.fallback-note{font-size:14px;color:var(--text-secondary);line-height:1.65;}
a.smogon-link{color:var(--royal);text-decoration:none;font-weight:600;}
a.smogon-link:hover{text-decoration:underline;}

.learnset-sub{font-size:12px;color:var(--text-muted);margin:-16px 0 18px;}
.learnset-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:0 clamp(12px,2vw,24px);}
.learn-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;
}
.learn-row .lv{color:var(--royal-light);font-weight:700;min-width:32px;}
.learn-row .mv{color:var(--white);flex:1;}
.learn-type-badge{
  font-size:9px;padding:2px 8px;border-radius:10px;
  font-weight:700;color:#0a0d12;flex-shrink:0;
}
.learnset-grid-empty{font-size:14px;color:var(--text-muted);font-style:italic;}

@media(max-width:1100px){
  .layout{grid-template-columns:1fr;}
  .poke-card{position:static;max-width:400px;margin:0 auto;}
  .poke-card img{width:min(240px,80%);}
  .build-columns{grid-template-columns:1fr 1fr;}
  .build-about-col{grid-column:span 2;}
  .learnset-columns{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:860px){
  .build-columns{grid-template-columns:1fr;}
  .build-about-col{grid-column:span 1;}
  .learnset-columns{grid-template-columns:1fr;}
  .poke-card img{width:min(200px,70%);}
  .fallback-grid{grid-template-columns:1fr;}
  .evo-node img{width:40px;height:40px;}
  .evo-node{padding:8px 10px 6px;min-width:60px;}
}
@media(max-width:640px){
  .navbar{padding:12px 16px;gap:10px;}
  .nav-brand{font-size:22px;}
  .search-box{width:100%;}
  main{padding:12px 12px 60px;}
  .layout{gap:12px;}
  .card{padding:16px;border-radius:14px;}
  .build-columns{gap:16px;}
  .learnset-columns{gap:0 12px;}
  .poke-card{border-radius:16px;padding:16px;}
  .poke-card img{width:min(180px,60%);}
  .poke-card .name{font-size:28px;}
  .learn-row{font-size:12px;gap:8px;padding:8px 0;}
  .learn-type-badge{font-size:8px;padding:1px 6px;}
  .move-pill{padding:8px 12px;font-size:13px;}
  .build-value{font-size:14px;}
  .poke-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
}
@media(max-width:380px){
  .navbar{padding:10px 12px;}
  .nav-brand{font-size:20px;}
  .search-box{height:40px;}
  .search-box button{height:28px;padding:0 12px;font-size:12px;}
  main{padding:8px 8px 40px;}
  .poke-card img{width:min(160px,55%);}
}
</style>
</head>
<body>

<div class="glow glow-tl"></div>
<div class="glow glow-tr"></div>
<div class="glow glow-bl"></div>
<div class="glow glow-br"></div>
<div class="glow glow-c"></div>

<nav class="navbar">
  <div class="nav-brand" id="navBrand" style="cursor:pointer">MoveDex</div>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Filter Pokémon..." autocomplete="off" />
    <button id="searchBtn">Search</button>
  </div>
  <button class="back-btn" id="backBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Back to Grid
  </button>
</nav>

<main id="mainArea">
  <div class="loading-state"><div class="spinner"></div>Loading Pokémon…</div>
</main>

<script>
const TYPE_COLORS={
  normal:"#A8A878",fire:"#F08030",water:"#6890F0",electric:"#F8D030",
  grass:"#78C850",ice:"#98D8D8",fighting:"#C03028",poison:"#A040A0",
  ground:"#E0C068",flying:"#A890F0",psychic:"#F85888",bug:"#A8B820",
  rock:"#B8A038",ghost:"#705898",dragon:"#7038F8",dark:"#705848",
  steel:"#B8B8D0",fairy:"#EE99AC"
};
const STAT_COLORS={HP:'#FF5959',Atk:'#F5AC78',Def:'#FAE078',SpA:'#9DB7F5',SpD:'#A7DB8D',Spe:'#FA92B2'};
const STAT_NAMES=['HP','Atk','Def','SpA','SpD','Spe'];
const STAT_KEYS=['hp','atk','def','spa','spd','spe'];

const ICONS={
  item:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>',
  ability:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>',
  nature:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 1 8-1 3.5-5.6 5.3-9 6z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>',

let DEX={};

const ALIASES={
  "lando-t":"landorus-therian","landorus therian":"landorus-therian","landorus-t":"landorus-therian",
  "great tusk":"great-tusk","gtusk":"great-tusk","ting lu":"ting-lu",
  "iron valiant":"iron-valiant","ogerpon wellspring":"ogerpon-wellspring","ogerpon-wellspring-mask":"ogerpon-wellspring","wellspring ogerpon":"ogerpon-wellspring",
  "iron moth":"iron-moth","rotom wash":"rotom-wash","rotom-w":"rotom-wash",
  "zamazenta crowned":"zamazenta","zamazenta-crowned":"zamazenta","zamazenta crowned shield":"zamazenta"
};

function normalize(str){
  let s=str.trim().toLowerCase();
  if(ALIASES[s])return ALIASES[s];
  s=s.replace(/[.']/g,"").replace(/\s+/g,"-");
  if(ALIASES[s])return ALIASES[s];
  return s;
}
function titleCase(s){return s.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function typeBadges(types){return types.map(t=>`<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${t.toUpperCase()}</span>`).join('');}

function parseEVs(evString){
  return evString.split('/').map(part=>{
    const m=part.trim().match(/^(\d+)\s+(\w+)$/);
    if(!m)return null;
    return{value:parseInt(m[1]),stat:m[2],color:STAT_COLORS[m[2]]||'#888'};
  }).filter(Boolean);
}

const VERSION_GROUP_PREFERENCE=[
  ['scarlet-violet','Scarlet/Violet'],['sword-shield','Sword/Shield'],
  ['ultra-sun-ultra-moon','Ultra Sun/Ultra Moon'],['sun-moon','Sun/Moon'],
  ['omega-ruby-alpha-sapphire','Omega Ruby/Alpha Sapphire'],['x-y','X/Y']
];

function buildLevelUpMoves(poke){
  for(const[gk,gl]of VERSION_GROUP_PREFERENCE){
    const found=new Map();
    poke.moves.forEach(m=>{m.version_group_details.forEach(vgd=>{
      if(vgd.move_learn_method.name==='level-up'&&vgd.version_group.name===gk){
        const l=vgd.level_learned_at;
        const e=found.get(m.move.name);
        if(e===undefined||l<found.get(m.move.name))found.set(m.move.name,l);
      }
    });});
    if(found.size>0){
      const list=Array.from(found.entries()).map(([n,l])=>({name:titleCase(n),level:l}));
      list.sort((a,b)=>a.level-b.level);
      return{list,groupLabel:gl};
    }
  }
  return{list:[],groupLabel:null};
}

async function fetchDexEntry(url){
  try{
    const r=await fetch(url);if(!r.ok)return'';
    const d=await r.json();
    const pref=['scarlet','violet','sword','shield'];
    let e=d.flavor_text_entries.find(x=>x.language.name==='en'&&pref.some(g=>x.version.name.includes(g)));
    if(!e)e=d.flavor_text_entries.find(x=>x.language.name==='en');
    return e?e.flavor_text.replace(/[\n\f]/g,' ').trim():'';
  }catch{return'';}
}

async function fetchEvolutionChain(speciesUrl){
  try{
    const res=await fetch(speciesUrl);if(!res.ok)return null;
    const species=await res.json();
    if(!species.evolution_chain||!species.evolution_chain.url)return null;
    const res2=await fetch(species.evolution_chain.url);if(!res2.ok)return null;
    const chain=await res2.json();
    const result=[];
    function traverse(node,detail){
      const id=node.species.url.match(/\/(\d+)\/?$/)?.[1];
      const name=titleCase(node.species.name);
      const evoDetails=node.evolution_details?.[0]||null;
      let label='';
      if(detail&&evoDetails){
        if(evoDetails.min_level)label=`Lv. ${evoDetails.min_level}`;
        else if(evoDetails.item)label=titleCase(evoDetails.item.name);
        else if(evoDetails.trigger?.name==='trade')label='Trade';
        else if(evoDetails.min_happiness)label='Happiness';
        else if(evoDetails.held_item)label=`Hold ${titleCase(evoDetails.held_item.name)}`;
        else if(evoDetails.location)label=titleCase(evoDetails.location);
        else if(evoDetails.known_move)label=`Know ${titleCase(evoDetails.known_move.name)}`;
        else if(evoDetails.time_of_day)label=evoDetails.time_of_day;
        else if(evoDetails.needs_overworld_rain)label='Rain';
        else if(evoDetails.party_species)label=titleCase(evoDetails.party_species.name);
        else if(evoDetails.relative_physical_stats!==undefined&&evoDetails.relative_physical_stats!==null){
          if(evoDetails.relative_physical_stats===1)label='Atk > Def';
          else if(evoDetails.relative_physical_stats===-1)label='Def > Atk';
          else label='Atk = Def';
        }
      }
      result.push({id,name,label});
      if(node.evolves_to)node.evolves_to.forEach(e=>traverse(e,true));
    }
    traverse(chain.chain,null);
    return result;
  }catch{return null;}
}

async function fetchAllMoveTypes(poke,moves){
  const urlMap={};
  poke.moves.forEach(m=>{urlMap[m.move.name]=m.move.url;});
  const names=new Set();
  if(moves)moves.forEach(m=>m.split('/').forEach(p=>names.add(p.trim())));
  const{list}=buildLevelUpMoves(poke);
  list.forEach(mv=>names.add(mv.name));
  const results=await Promise.all([...names].map(name=>{
    const api=name.toLowerCase().replace(/\s+/g,'-');
    const url=urlMap[api];
    if(!url)return Promise.resolve({name,type:null});
    return fetch(url).then(r=>r.json()).then(d=>({name,type:d.type.name})).catch(()=>({name,type:null}));
  }));
  const map={};
  results.forEach(r=>{if(r.type)map[r.name]=r.type;});
  return map;
}

function splitCols(arr,n){
  const cols=Array.from({length:n},()=>[]);
  arr.forEach((item,i)=>cols[i%n].push(item));
  return cols;
}

function itemSpriteUrl(itemName){
  const slug=itemName.toLowerCase().replace(/\s+/g,'-').replace(/[é]/g,'e');
  return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${slug}.png`;
}

function genericAdviceFor(types){
  const t=types[0];
  const items={
    fire:"Heavy-Duty Boots, Choice Specs/Band, or Life Orb",
    water:"Leftovers, Assault Vest, or Choice Specs",
    grass:"Leftovers or Life Orb",
    electric:"Choice Specs/Scarf or Life Orb",
    ice:"Choice Scarf or Life Orb",
    fighting:"Life Orb or Assault Vest",
    poison:"Black Sludge or Leftovers",
    ground:"Choice Scarf/Band or Leftovers",
    flying:"Heavy-Duty Boots",
    psychic:"Life Orb or Choice Specs",
    bug:"Heavy-Duty Boots",
    rock:"Leftovers or Assault Vest",
    ghost:"Choice Specs/Scarf or Leftovers",
    dragon:"Choice Scarf/Specs or Leftovers",
    dark:"Choice Band/Specs or Leftovers",
    steel:"Leftovers or Assault Vest",
    fairy:"Leftovers or Assault Vest",
    normal:"Leftovers or Choice Band"
  };
  return items[t]||"Leftovers or Choice Specs/Band";
}

const mainArea=document.getElementById('mainArea');
const inputEl=document.getElementById('searchInput');
const btnEl=document.getElementById('searchBtn');
const backBtn=document.getElementById('backBtn');

let pokeCache=[];
let currentView='grid';
let gridObserver=null;
let gridBatchIdx=0;
let gridFiltered=[];
const GRID_BATCH=150;

function spriteUrl(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}

function makeGridItem(p){
  const inDex=DEX[p.slug];
  return`<div class="poke-grid-item${inDex?' has-build':''}" data-slug="${p.slug}" data-name="${escapeHtml(p.name)}">
    <img data-src="${spriteUrl(p.id)}" alt="${escapeHtml(p.name)}">
    <span class="grid-id">#${String(p.id).padStart(3,'0')}</span>
    <span class="grid-name">${escapeHtml(p.name)}</span>
  </div>`;
}

function loadVisibleImages(){
  mainArea.querySelectorAll('.poke-grid-item img[data-src]:not(.loaded)').forEach(img=>{
    const rect=img.getBoundingClientRect();
    if(rect.top<window.innerHeight+300){
      img.src=img.dataset.src;
      img.removeAttribute('data-src');
      img.onload=()=>img.classList.add('loaded');
      img.onerror=()=>img.classList.add('loaded');
    }
  });
}

function appendNextBatch(){
  const grid=mainArea.querySelector('.poke-grid');
  if(!grid)return;
  const start=gridBatchIdx;
  const end=Math.min(start+GRID_BATCH,gridFiltered.length);
  if(start>=end)return;
  for(let i=start;i<end;i++){
    grid.insertAdjacentHTML('beforeend',makeGridItem(gridFiltered[i]));
  }
  gridBatchIdx=end;
  loadVisibleImages();
  if(gridBatchIdx>=gridFiltered.length){
    const ld=mainArea.querySelector('.grid-loader');
    if(ld)ld.remove();
  }
}

function renderGrid(filter){
  currentView='grid';
  backBtn.classList.remove('visible');
  inputEl.placeholder='Filter Pokémon...';
  if(gridObserver){gridObserver.disconnect();gridObserver=null;}
  let filtered=pokeCache;
  if(filter){
    const q=filter.toLowerCase();
    filtered=pokeCache.filter(p=>p.name.toLowerCase().includes(q)||p.slug.includes(q)||String(p.id).includes(q));
  }
  gridFiltered=filtered;
  gridBatchIdx=0;
  const countHtml=`<div class="grid-count">${filtered.length} Pokémon${filter?' matching "'+escapeHtml(filter)+'"':''}</div>`;
  const loaderHtml=`<div class="grid-loader" id="gridLoader"><div class="spinner"></div>Loading more…</div>`;
  mainArea.innerHTML=`${countHtml}<div class="poke-grid" id="pokeGrid"></div>${loaderHtml}`;
  appendNextBatch();
  const grid=document.getElementById('pokeGrid');
  grid.addEventListener('click',e=>{
    const item=e.target.closest('.poke-grid-item');
    if(item)lookup(item.dataset.name);
  });
  if(gridBatchIdx<gridFiltered.length){
    const sentinel=document.getElementById('gridLoader');
    gridObserver=new IntersectionObserver(()=>{
      if(currentView!=='grid')return;
      appendNextBatch();
    },{rootMargin:'600px'});
    gridObserver.observe(sentinel);
  } else {
    const ld=document.getElementById('gridLoader');
    if(ld)ld.remove();
  }
  loadVisibleImages();
  window.addEventListener('scroll',loadVisibleImages,{passive:true});
}

function renderLoading(){
  mainArea.innerHTML='<div class="loading-state"><div class="spinner"></div>Looking up Pokémon…</div>';
}
function renderError(name){
  mainArea.innerHTML=`<div class="error-state"><strong>Couldn't find "${escapeHtml(name)}"</strong><span>Check the spelling and try again.</span></div>
    <div style="text-align:center;margin-top:20px"><button class="back-btn visible" onclick="renderGrid()">← Back to Grid</button></div>`;
}

function renderBaseStats(stats){
  const total=stats.reduce((s,v)=>s+v,0);
  return`<div class="fallback-section">
    <div class="fallback-section-title">Base Stats</div>
    ${stats.map((v,i)=>{
      const pct=Math.min((v/255)*100,100);
      return`<div class="stat-row">
        <span class="stat-name">${STAT_NAMES[i]}</span>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%;background:${STAT_COLORS[STAT_NAMES[i]]}"></div></div>
        <span class="stat-val">${v}</span>
      </div>`;
    }).join('')}
    <div class="base-stats-total">BST: ${total}</div>
  </div>`;
}

function renderAbilities(abilities){
  return`<div class="fallback-section">
    <div class="fallback-section-title">Abilities</div>
    <div class="ability-list">
      ${abilities.map(a=>`<span class="ability-pill${a.is_hidden?' hidden-ability':''}">${titleCase(a.ability.name)}${a.is_hidden?' (HA)':''}</span>`).join('')}
    </div>
  </div>`;
}

function renderEvolutionChain(chain,currentId){
  if(!chain||chain.length<=1)return'';
  return`<div class="card" style="padding:16px 20px">
    <div class="evo-section-title">${ICONS.evo} Evolution Chain</div>
    <div class="evo-chain">
      ${chain.map((node,i)=>{
        const isCurrent=String(node.id)===String(currentId);
        const arrow=i<chain.length-1?
          `<div class="evo-arrow">${ICONS.evo}${chain[i+1].label?`<span class="evo-method">${escapeHtml(chain[i+1].label)}</span>`:''}</div>`:'';
        return`<div class="evo-node${isCurrent?' current':''}" data-name="${escapeHtml(node.name)}" onclick="lookup('${escapeHtml(node.name)}')">
          <img src="${spriteUrl(node.id)}" alt="${escapeHtml(node.name)}" loading="lazy">
          <span class="evo-name">${escapeHtml(node.name)}</span>
          ${node.label&&!isCurrent?`<span class="evo-detail">${escapeHtml(node.label)}</span>`:''}
        </div>${arrow}`;
      }).join('')}
    </div>
  </div>`;
}

let currentDetailAbort=null;

async function lookup(rawName){
  if(!rawName||!rawName.trim()){renderGrid();return;}
  if(currentDetailAbort)currentDetailAbort.abort();
  currentDetailAbort=new AbortController();
  const signal=currentDetailAbort.signal;
  renderLoading();
  currentView='detail';
  backBtn.classList.add('visible');
  inputEl.placeholder='Search Pokémon...';

  const key=normalize(rawName);
  const entry=DEX[key];
  const apiSlug=entry?entry.api:key;
  let poke;
  try{
    const res=await fetch(`https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(apiSlug)}`,{signal});
    if(!res.ok)throw new Error('not found');
    poke=await res.json();
  }catch(e){if(e.name!=='AbortError')renderError(rawName);return;}

  const sprite=(poke.sprites.other&&poke.sprites.other['official-artwork']&&poke.sprites.other['official-artwork'].front_default)||poke.sprites.front_default;
  const types=poke.types.map(t=>t.type.name);
  const displayName=entry?entry.display:poke.name.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  const dexNum='#'+String(poke.id).padStart(3,'0');
  const height=(poke.height/10).toFixed(1)+' m';
  const weight=(poke.weight/10).toFixed(1)+' kg';
  const smogonUrl=`https://www.smogon.com/dex/sv/pokemon/${poke.name}/`;

  const[dexEntry,typeMap,evoChain]=await Promise.all([
    fetchDexEntry(poke.species.url),
    fetchAllMoveTypes(poke,entry?Object.values(entry.allSets||{}).flatMap(s=>s.moves):null),
    fetchEvolutionChain(poke.species.url)
  ]);

  if(signal.aborted)return;

  let buildHtml;
  if(entry){
    const setNames=Object.keys(entry.allSets||{});
    const firstSet=entry.allSets[setNames[0]]||entry;

    function renderSet(set){
      const evs=parseEVs(set.evs||'');
      const total=evs.reduce((s,e)=>s+e.value,0)||1;
      const evBar=evs.map(e=>`<div class="ev-segment" style="width:${(e.value/total*100).toFixed(1)}%;background:${e.color}" title="${e.stat}: ${e.value}"></div>`).join('');

      const statsRows=[
        {icon:ICONS.item,label:'Item',value:set.item||''},
        {icon:ICONS.ability,label:'Ability',value:set.ability||''},
        {icon:ICONS.nature,label:'Nature',value:set.nature||''},
        {icon:ICONS.tera,label:'Tera Type',value:set.tera||''},
      ];

      const statsHtml=statsRows.map(r=>`
        <div class="build-row">
          <div class="build-row-header">${r.icon}<span class="build-label">${r.label}</span></div>
          <div class="build-value" style="display:flex;align-items:center;gap:8px">
            <img class="item-sprite" src="${itemSpriteUrl(r.value)}" onerror="this.style.display='none'" alt="">
            ${escapeHtml(r.value)}
          </div>
        </div>`).join('')+`
        <div class="build-row">
          <div class="build-row-header">${ICONS.evs}<span class="build-label">EV Spread</span></div>
          <div class="build-value">${set.evs}</div>
          <div class="ev-bar">${evBar}</div>
        </div>`;

      const movesHtml=(set.moves||[]).map(m=>{
        const primary=m.split('/')[0].trim();
        const t=typeMap[primary];
        const tc=t?TYPE_COLORS[t]:null;
        return`<div class="move-pill">${ICONS.sword}<span>${escapeHtml(m)}</span>${tc?`<span class="move-type-badge" style="background:${tc}">${t.toUpperCase()}</span>`:''}</div>`;
      }).join('');

      return`<div class="build-columns">
        <div class="build-col">${statsHtml}</div>
        <div class="build-col">
          <div class="build-col-title">${ICONS.sword} Moveset</div>
          <div style="display:flex;flex-direction:column;gap:8px">${movesHtml}</div>
        </div>
        <div class="build-col build-about-col">
          <div class="build-col-title">About This Build</div>
          <p class="about-text">${entry.note||''}</p>
          <a class="smogon-btn" href="${smogonUrl}" target="_blank" rel="noopener">View on Smogon ${ICONS.link}</a>
        </div>
      </div>`;
    }

    let setSelectorHtml='';
    if(setNames.length>1){
      setSelectorHtml=`<div class="set-selector" id="setSelector">
        ${setNames.map((n,i)=>`<button class="set-btn${i===0?' active':''}" data-set="${escapeHtml(n)}">${escapeHtml(n)}</button>`).join('')}
      </div>`;
    }

    buildHtml=`<div class="card">
      <div class="card-header"><h2>Competitive Build</h2><span class="tier-pill">${entry.tier}</span></div>
      ${setSelectorHtml}
      <div id="buildContent">${renderSet(firstSet)}</div>
    </div>`;

    if(setNames.length>1){
      setTimeout(()=>{
        const selector=document.getElementById('setSelector');
        if(!selector)return;
        selector.addEventListener('click',e=>{
          const btn=e.target.closest('.set-btn');
          if(!btn)return;
          selector.querySelectorAll('.set-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const setName=btn.dataset.set;
          const set=entry.allSets[setName]||firstSet;
          document.getElementById('buildContent').innerHTML=renderSet(set);
        });
      },0);
    }
  } else {
    const baseStats=poke.stats.map(s=>s.base_stat);
    const abilities=poke.abilities;
    buildHtml=`<div class="card">
      <div class="card-header"><h2>Competitive Overview</h2></div>
      <span class="fallback-tag">No curated set — showing base data</span>
      <div class="fallback-grid">
        ${renderBaseStats(baseStats)}
        ${renderAbilities(abilities)}
      </div>
      <div style="margin-top:16px">
        <div class="fallback-section">
          <div class="fallback-section-title">Suggested Items (${types.join('/')} type)</div>
          <div class="suggested-moves">
            ${genericAdviceFor(types).split(', ').map(i=>`<span class="suggested-move">${escapeHtml(i)}</span>`).join('')}
          </div>
        </div>
      </div>
      <div style="margin-top:16px">
        <a class="smogon-btn" href="${smogonUrl}" target="_blank" rel="noopener">View on Smogon ${ICONS.link}</a>
      </div>
    </div>`;
  }

  const{list:learnList,groupLabel}=buildLevelUpMoves(poke);
  let learnHtml;
  if(learnList.length===0){
    learnHtml=`<div class="card"><div class="card-header"><h2>Level-Up Learnset</h2></div><div class="learnset-grid-empty">No level-up learnset data available.</div></div>`;
  } else {
    const colHtml=splitCols(learnList,3).map(col=>{
      return col.map(mv=>{
        const t=typeMap[mv.name];
        const tc=t?TYPE_COLORS[t]:null;
        const lv=mv.level===0?'Evo':mv.level;
        return`<div class="learn-row"><span class="lv">${lv}</span><span class="mv">${escapeHtml(mv.name)}</span>${tc?`<span class="learn-type-badge" style="background:${tc}">${t.toUpperCase()}</span>`:''}</div>`;
      }).join('');
    });
    learnHtml=`<div class="card">
      <div class="card-header"><h2>Level-Up Learnset</h2></div>
      <div class="learnset-sub">${groupLabel} — ${learnList.length} moves, lowest level first</div>
      <div class="learnset-columns">${colHtml.map(c=>`<div>${c}</div>`).join('')}</div>
    </div>`;
  }

  const evoHtml=renderEvolutionChain(evoChain,poke.id);

  mainArea.innerHTML=`
    <div class="layout">
      <aside class="poke-card">
        <img src="${sprite}" alt="${displayName}" onerror="this.style.display='none'">
        <div class="dex-num">${dexNum}</div>
        <div class="name">${displayName}</div>
        <div class="types">${typeBadges(types)}</div>
        <div class="poke-stats">
          <div class="poke-stat"><div class="stat-label">Height</div><div class="stat-value">${height}</div></div>
          <div class="poke-stat"><div class="stat-label">Weight</div><div class="stat-value">${weight}</div></div>
        </div>
        ${dexEntry?`<p class="poke-dex-entry">${escapeHtml(dexEntry)}</p>`:''}
      </aside>
      <div class="content-col">
        ${evoHtml}
        ${buildHtml}
        ${learnHtml}
      </div>
    </div>`;
}

document.getElementById('navBrand').addEventListener('click',()=>{inputEl.value='';renderGrid();});

btnEl.addEventListener('click',()=>{
  if(currentView==='grid'){lookup(inputEl.value);}
  else{renderGrid(inputEl.value);}
});
inputEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(currentView==='grid'){lookup(inputEl.value);}
    else{renderGrid(inputEl.value);}
  }
});
let filterTimer=null;
inputEl.addEventListener('input',()=>{
  if(currentView==='grid'){
    clearTimeout(filterTimer);
    filterTimer=setTimeout(()=>renderGrid(inputEl.value),150);
  }
});
window.addEventListener('scroll',()=>{
  if(currentView==='grid')loadVisibleImages();
},{passive:true});

async function loadAll(){
  const [pokeRes,dexRes]=await Promise.all([
    fetch('https://pokeapi.co/api/v2/pokemon?limit=1025'),
    fetch('smogon-dex.json')
  ]);
  const pokeData=await pokeRes.json();
  DEX=await dexRes.json();
  pokeCache=pokeData.results.map(p=>{
    const m=p.url.match(/\/(\d+)\/?$/);
    const id=m?parseInt(m[1]):0;
    return{name:p.name.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '),slug:p.name,id};
  });
  pokeCache.sort((a,b)=>a.id-b.id);
  renderGrid();
}

loadAll().catch(()=>{
  mainArea.innerHTML='<div class="error-state"><strong>Failed to load Pokémon</strong><span>Check your connection and refresh.</span></div>';
});
</script>
